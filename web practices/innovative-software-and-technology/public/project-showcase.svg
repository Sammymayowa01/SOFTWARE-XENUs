<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" rx="12" fill="url(#paint0_linear_project)"/>
  
  <!-- Subtle Grid Pattern -->
  <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800M0 400H800M0 450H800M0 500H800M0 550H800" stroke="#1D4ED8" stroke-width="0.5" stroke-opacity="0.1"/>
  <path d="M50 0V600M100 0V600M150 0V600M200 0V600M250 0V600M300 0V600M350 0V600M400 0V600M450 0V600M500 0V600M550 0V600M600 0V600M650 0V600M700 0V600M750 0V600" stroke="#1D4ED8" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Stylized Terminal Window -->
  <rect x="150" y="150" width="500" height="300" rx="8" fill="#0A1A2F" stroke="#1D4ED8" stroke-opacity="0.3"/>
  <rect x="150" y="150" width="500" height="30" rx="8" fill="#111827"/>
  <circle cx="175" cy="165" r="4" fill="#EF4444"/>
  <circle cx="195" cy="165" r="4" fill="#F59E0B"/>
  <circle cx="215" cy="165" r="4" fill="#10B981"/>

  <!-- Code Lines -->
  <rect x="180" y="200" width="120" height="6" rx="3" fill="#3B82F6" fill-opacity="0.4"/>
  <rect x="180" y="220" width="200" height="6" rx="3" fill="#1D4ED8" fill-opacity="0.4"/>
  <rect x="180" y="240" width="150" height="6" rx="3" fill="#3B82F6" fill-opacity="0.4"/>
  <rect x="180" y="260" width="180" height="6" rx="3" fill="#1D4ED8" fill-opacity="0.4"/>
  
  <!-- Floating Elements (Modular Blocks) -->
  <g opacity="0.8">
    <rect x="550" y="100" width="60" height="60" rx="12" fill="url(#paint1_linear_block)" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="580" y="280" width="40" height="40" rx="8" fill="url(#paint1_linear_block)" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="100" y="380" width="50" height="50" rx="10" fill="url(#paint1_linear_block)" stroke="#3B82F6" stroke-width="1.5"/>
  </g>

  <!-- Glowing Nodes -->
  <circle cx="580" cy="130" r="3" fill="#60A5FA">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="600" cy="300" r="2" fill="#60A5FA">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite" />
  </circle>

  <defs>
    <linearGradient id="paint0_linear_project" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1A2F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="paint1_linear_block" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#1D4ED8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
